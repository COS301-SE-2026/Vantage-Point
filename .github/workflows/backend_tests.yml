name: Backend Tests & Quality

on:
  push:
    branches: [main, staging, dev]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, staging, dev]
    paths:
      - 'backend/**'

jobs:
  # ============================================================================
  # LEVEL 1: CODE QUALITY GATE (Lint + Format + Type Check)
  # ============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Format check with Black
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && black --check app

      - name: Lint with Ruff
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && ruff check app

      - name: Type check with MyPy
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && mypy app

      - name: Security check with Bandit
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && bandit -r app

      - name: Dead code & style check with Pylint
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && pylint app --disable=all --enable=W0511,W0105,W0611

  # ============================================================================
  # LEVEL 2: UNIT TESTS & COVERAGE (With DB Integration Container)
  # ============================================================================
  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: riot_user
          POSTGRES_PASSWORD: riot_password
          POSTGRES_DB: riot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          JWT_SECRET: test-ci-secret
          TEST_USER_PASSWORD: test-ci-user-password
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: cd backend && pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Generate coverage badge
        run: |
          cd backend
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; root = ET.parse('coverage.xml').getroot(); print(f'{float(root.attrib[\"line-rate\"])*100:.1f}')")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          curl "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" -o coverage-badge.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: backend/coverage-badge.svg
          retention-days: 30

      - name: Commit and push coverage badge
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          cd backend
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.svg
          git commit -m "chore: update backend coverage badge" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # LEVEL 3: BUILD VERIFICATION (Production Smoke-Test)
  # ============================================================================
  build:
    name: Backend Build Verification
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install production dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # Smoke test: Ensures Uvicorn can initialize the API without missing modules or structural syntax crashes.
      # It boots up the server, waits 5 seconds to confirm execution stability, and shuts it down cleanly.
      - name: Production startup smoke test
        env:
          JWT_SECRET: test-ci-secret
          DATABASE_URL: postgresql+asyncpg://riot_user:riot_password@localhost:5432/riot_db
        run: |
          cd backend
          timeout 5s uvicorn app.main:app --host 127.0.0.1 --port 8000 || [ $? -eq 124 ]
