name: Backend Tests & Quality

on:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Format check with Black
        run: cd backend && black --check app

      - name: Lint with Ruff
        run: cd backend && ruff check app

      - name: Type check with MyPy
        run: cd backend && mypy app

  test:
    name: Unit Tests and Coverage
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: riot_user
          POSTGRES_PASSWORD: riot_password
          POSTGRES_DB: riot_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: cd backend && pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Generate coverage badge
        run: |
          cd backend
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; root = ET.parse('coverage.xml').getroot(); print(f'{float(root.attrib[\"line-rate\"])*100:.1f}')")
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

          # Create badge
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          curl "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" -o coverage-badge.svg

      - name: Upload coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: backend/coverage-badge.svg
          retention-days: 30
