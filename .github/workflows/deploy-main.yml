name: Deploy Production (Main)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (Trigger)
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              # Navigate to the project directory
              cd /Vantage-Point-Prod || exit 1

              # Pull the latest main branch onto the server
              git pull origin main

              # Run the deployment script
              chmod +x .github/workflows/deploy-main.sh
              .github/workflows/deploy-main.sh
