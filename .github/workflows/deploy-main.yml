name: Deploy Production (Main)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (Trigger)
        uses: actions/checkout@69455315140e3c1759a2a8c35a28c24b74bb1e11

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@40e94da9fb0daec35133642398b04a43b070438b
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              # Navigate to the project directory
              cd /Vantage-Point-Prod || exit 1

              # Pull the latest main branch onto the server
              git pull origin main

              # Run the deployment script
              chmod +x .github/workflows/deploy-main.sh
              .github/workflows/deploy-main.sh
