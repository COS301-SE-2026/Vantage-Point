server {
    listen 80;

    # Route any traffic starting with /api directly to the backend container
    location /api/ {
        proxy_pass http://backend:8000;  # Uses Docker's internal DNS naming
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the static React files for all other requests
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;  # Fixes React Router 404 issues on refresh
    }
}
