# Generated / vendor / local-only paths (not product source)
sonar.exclusions=\
  frontend/coverage/**,\
  frontend/dist/**,\
  frontend/node_modules/**,\
  backend/uploads/**,\
  **/*.webp,\
  **/*.png,\
  **/*.jpg,\
  **/*.jpeg

# Figma export trees and seed payloads are data-heavy, not logic duplication
sonar.cpd.exclusions=\
  frontend/src/landing/imports/**,\
  backend/app/database/seed_data/**,\
  backend/app/tests/**

# Test-only credentials (see app/tests/constants.py)
sonar.issue.ignore.multicriteria=testCredentials

sonar.issue.ignore.multicriteria.testCredentials.ruleKey=python:S2068,javascript:S2068,typescript:S2068,secrets:S6702
sonar.issue.ignore.multicriteria.testCredentials.resourceKey=**/app/tests/**
