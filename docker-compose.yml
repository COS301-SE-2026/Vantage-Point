# The docker-compose configuration is for production, to use containers when developing please use the devcontainers

services:
  # Main database
  postgres-db:
    image: postgres:16-alpine
    container_name: ${APP_ENV}-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      # Keeps your data safe even if the container stops or restarts
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  # Backend (Gunicorn)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${APP_ENV}-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres-db:5432/${DB_NAME}
      - ENV=${APP_ENV}
    depends_on:
      - postgres-db
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${APP_ENV}-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
    name: ${APP_ENV}-pgdata
