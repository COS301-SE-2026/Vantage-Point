warn_unused_configs = True
ignore_missing_imports = False

[mypy-sklearn.datasets]
ignore_missing_imports = True

[mypy-sklearn.model_selection]
ignore_missing_imports = True

[mypy-sklearn.neighbors]
ignore_missing_imports = True

[mypy-sklearn.metrics]
ignore_missing_imports = True
